name: Birthday reminders cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders endpoint
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/reminders"
